<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Title & Logo -->
    <title>GitHub Issues Tracker</title>
    <link
      rel="shortcut icon"
      href="./assets/github-logo.png"
      type="image/x-icon"
    />

    <!-- DaisyUI & Tailwind CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <!-- Custom Styles -->
    <style>
      * {
        font-family: "Geist", sans-serif;
        font-optical-sizing: auto;
      }
    </style>
  </head>
  <body>
    <!-- Navigation Section Start -->
    <section class="border-b border-[#E9E9E9]">
      <div
        class="mx-auto px-4 lg:px-20 flex flex-col lg:flex-row items-center justify-between py-4 gap-6"
      >
        <div class="flex items-center gap-4">
          <img class="w-9" src="./assets/github-logo.png" alt="GitHub Logo" />
          <h1 class="text-2xl text-[#1F2937] font-semibold">
            GitHub Issues Tracker
          </h1>
        </div>
        <div class="flex items-center gap-4">
          <div class="">
            <div class="join">
              <div>
                <label
                  class="input validator join-item border-[#E4E4E7] outline-none"
                >
                  <i class="fa-solid fa-magnifying-glass text-[#6B7280]"></i>
                  <input
                    id="search_input"
                    type="email"
                    placeholder="Search issues..."
                    required
                  />
                </label>
              </div>
              <button id="search_btn" class="btn btn-primary join-item">
                <i class="fas fa-search"></i>
              </button>
            </div>
          </div>
          <div class="">
            <div class="btn btn-primary">
              <i class="fa-solid fa-plus"></i> New Issue
            </div>
          </div>
        </div>
      </div>
    </section>
    <!-- Navigation Section End-->

    <main class="bg-[#F8FAFC] h-screen w-screen p-3">
      <!-- Button Section Start -->
      <section class="pt-8 lg:pt-16">
        <div
          class="mx-auto text-center container mb-4 flex justify-center lg:justify-start gap-2 p-6 bg-white rounded-lg shadow"
        >
          <div
            onclick="allIssue()"
            id="all_btn"
            class="btn btn-primary btn-outline w-20 lg:w-32 font-semibold text-[#64748B] hover:text-white hover:bg-[#422ad5] border-[#E4E4E7]"
          >
            All
          </div>
          <div
            onclick="openIssue()"
            id="open_btn"
            class="btn btn-primary btn-outline w-20 lg:w-32 font-semibold text-[#64748B] hover:text-white hover:bg-[#422ad5] border-[#E4E4E7]"
          >
            Open
          </div>
          <div
            onclick="closedIssue()"
            id="closed_btn"
            class="btn btn-primary btn-outline w-20 lg:w-32 font-semibold text-[#64748B] hover:text-white hover:bg-[#422ad5] border-[#E4E4E7]"
          >
            Closed
          </div>
        </div>
      </section>
      <!-- Button Section End -->

      <!-- Issues Count Section Start -->
      <section>
        <div
          class="mx-auto container flex flex-col lg:flex-row gap-3 justify-between items-center p-6 bg-white rounded-t-lg shadow borber-b border-[#E4E4E7]"
        >
          <div class="flex gap-2">
            <img
              class="p-2.5 w-[50px] h-[50px] bg-[#ECE4FF] rounded-full"
              src="./assets/Aperture.png"
              alt=""
            />
            <div class="space-y-1">
              <h1 class="text-xl text-[#1F2937] font-semibold">
                <span id="count_issue"></span> Issues
              </h1>
              <p class="text-[#64748B]">Track and manage your project issues</p>
            </div>
          </div>
          <div class="flex gap-4">
            <div class="flex items-center gap-2">
              <div class="w-3 h-3 bg-[#00A96E] rounded-full"></div>
              <p class="text-[#1F2937]">Open</p>
            </div>
            <div class="flex items-center gap-2">
              <div class="w-3 h-3 bg-[#A855F7] rounded-full"></div>
              <p class="text-[#1F2937]">Closed</p>
            </div>
          </div>
        </div>
      </section>
      <!-- Issues Count Section End -->

      <!-- Issues List Section Start -->
      <section>
        <div
          id="issues_container"
          class="mx-auto container grid lg:grid-cols-3 bg-[#FBFBFB] p-3 lg:p-6 mb-32 rounded-b-lg shadow gap-3"
        ></div>
      </section>
      <!-- Issues List Section End -->
    </main>

    <!-- Script Section -->
    <script src="./script/script.js"></script>
  </body>
</html>
