<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Title & Logo -->
    <title>GitHub Issues Tracker</title>
    <link
      rel="shortcut icon"
      href="./assets/github-logo.png"
      type="image/x-icon"
    />

    <!-- DaisyUI & Tailwind CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <!-- Custom Styles -->
    <style>
      * {
        font-family: "Geist", sans-serif;
        font-optical-sizing: auto;
      }
    </style>
  </head>
  <body>
    <!-- Navigation Section Start -->
    <section class="border-b border-[#E9E9E9]">
      <div class="mx-auto container flex items-center justify-between py-4">
        <div class="flex items-center gap-4">
          <img class="w-9" src="./assets/github-logo.png" alt="GitHub Logo" />
          <h1 class="text-2xl text-[#1F2937] font-semibold">
            GitHub Issues Tracker
          </h1>
        </div>
        <div class="flex items-center gap-4">
          <div class="">
            <div class="join">
              <div>
                <label
                  class="input validator join-item border-[#E4E4E7] outline-none"
                >
                  <i class="fa-solid fa-magnifying-glass text-[#6B7280]"></i>
                  <input
                    id="search_input"
                    type="email"
                    placeholder="Search issues..."
                    required
                  />
                </label>
              </div>
              <button id="search_btn" class="btn btn-primary join-item">
                <i class="fas fa-search"></i>
              </button>
            </div>
          </div>
          <div class="">
            <div class="btn btn-primary">
              <i class="fa-solid fa-plus"></i> New Issue
            </div>
          </div>
        </div>
      </div>
    </section>
    <!-- Navigation Section End-->


    <!-- Script Section -->
     <script src="./script/script.js"></script>
  </body>
</html>
