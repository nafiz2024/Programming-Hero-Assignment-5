<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Title & Logo -->
    <title>GitHub Issues Tracker</title>
    <link
      rel="shortcut icon"
      href="./assets/github-logo.png"
      type="image/x-icon"
    />

    <!-- DaisyUI & Tailwind CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <!-- Custom Styles -->
    <style>
      * {
        font-family: "Geist", sans-serif;
        font-optical-sizing: auto;
      }
    </style>
  </head>
  <body>
    <!-- Login Section -->
    <section
      class="bg-[#F8FAFC] h-screen mx-auto text-center flex items-center justify-center"
    >
      <div class="p-8 bg-white rounded-lg space-y-6">
        <div class="flex flex-col items-center gap-6">
          <img src="./assets/github-logo.png" alt="" srcset="" />
          <div class="space-y-1">
            <h1 class="text-2xl text-[#1F2937] font-semibold">
              GitHub Issues Tracker
            </h1>
            <p class="text-[#64748B]">Sign in to manage your issues</p>
          </div>
        </div>
        <div class="">
          <fieldset class="fieldset w-sm p-4">
            <label class="label font-medium text-[#1F2937]">Username</label>
            <input
              id="login_input"
              type="text"
              class="input w-sm leading-4 text-[#71717A]"
              placeholder="Enter Username"
            />

            <label class="label font-medium text-[#1F2937] mt-4"
              >Password</label
            >
            <input
              id="login_password"
              type="password"
              class="input w-sm leading-4 text-[#71717A]"
              placeholder="Enter Password"
            />

            <button id="login_btn" class="btn btn-primary mt-6">Login</button>
          </fieldset>
        </div>
      </div>
    </section>

    <script src="./script/login.js"></script>
  </body>
</html>
